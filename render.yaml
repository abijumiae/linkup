services:
  - type: web
    name: linkup-backend
    runtime: node
    # REQUIRED: Starter disables sleep — free tier causes "server waking up" errors.
    plan: starter
    repo: https://github.com/abijumiae/linkup
    branch: main
    rootDir: linkup_backend
    autoDeploy: true
    buildCommand: npm ci --include=dev && npx prisma generate && npm run build
    startCommand: npm run start:render
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PRISMA_MIGRATION_ADVISORY_LOCK_TIMEOUT
        value: "60000"
      # Frontend / email links
      - key: APP_URL
        value: https://www.thelinkupzone.com
      - key: FRONTEND_URL
        value: https://www.thelinkupzone.com
      - key: PUBLIC_API_URL
        value: https://api.thelinkupzone.com
      # Microsoft 365 SMTP — set SMTP_PASS manually in Render dashboard (Secret)
      - key: SMTP_HOST
        value: smtp.office365.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        value: admin@thelinkupzone.com
      - key: SMTP_FROM
        value: LinkUp <admin@thelinkupzone.com>
      - key: MAIL_FROM
        value: LinkUp <admin@thelinkupzone.com>
      - key: SMTP_PASS
        sync: false
      # Set manually in Render dashboard (sync: false):
      # DATABASE_URL, JWT_SECRET, CORS_ORIGINS
      # Vercel: NEXT_PUBLIC_API_URL and NEXT_PUBLIC_SOCKET_URL=https://api.thelinkupzone.com
