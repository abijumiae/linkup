services:
  - type: web
    name: linkup-backend
    runtime: node
    repo: https://github.com/abijumiae/linkup
    branch: main
    rootDir: linkup_backend
    buildCommand: npm ci && npm run build && npx prisma migrate deploy
    startCommand: npm run start:prod
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # Set in Render dashboard after DNS is verified:
      # FRONTEND_URL=https://www.thelinkupzone.com
      # PUBLIC_API_URL=https://api.thelinkupzone.com
      # CORS_ORIGINS=https://thelinkupzone.com,https://www.thelinkupzone.com,https://linkup-nu-ruby.vercel.app
      # MAIL_FROM=LinkUp <admin@thelinkupzone.com>
