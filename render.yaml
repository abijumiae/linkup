services:
  - type: web
    name: linkup-backend
    runtime: node
    # REQUIRED: Starter disables sleep — free tier causes "server waking up" errors.
    plan: starter
    repo: https://github.com/abijumiae/linkup
    branch: main
    rootDir: linkup_backend
    autoDeploy: true
    # Migrations run at start (not build) to avoid P1002 advisory lock timeouts
    # when Neon pooler is slow or a prior deploy still holds the lock.
    buildCommand: npm ci --include=dev && npx prisma generate && npm run build
    startCommand: npm run start:render
    healthCheckPath: /api/health
    # Render auto-restarts on crash when health checks fail.
    # External monitoring: UptimeRobot/Better Stack → GET /api/health every 1 min.
    # GitHub Actions: .github/workflows/backend-uptime.yml (every 5 min backup ping).
    envVars:
      - key: NODE_ENV
        value: production
      - key: PRISMA_MIGRATION_ADVISORY_LOCK_TIMEOUT
        value: "60000"
      # Required in Render dashboard (sync: false — set values manually):
      # DATABASE_URL=postgresql://... (Neon/Supabase — allow 0.0.0.0/0 or Render egress IPs)
      # JWT_SECRET=<long-random-secret>
      # FRONTEND_URL=https://www.thelinkupzone.com
      # PUBLIC_API_URL=https://api.thelinkupzone.com
      # CORS_ORIGINS=https://thelinkupzone.com,https://www.thelinkupzone.com,https://linkup-nu-ruby.vercel.app
      # Vercel: NEXT_PUBLIC_API_URL and NEXT_PUBLIC_SOCKET_URL=https://api.thelinkupzone.com
      # MAIL_FROM=LinkUp <admin@thelinkupzone.com>
      # Use a paid always-on instance — free tier sleeps and causes login timeouts.
