services:
  - type: web
    name: linkup-backend
    runtime: node
    repo: https://github.com/abijumiae/linkup
    branch: main
    rootDir: linkup_backend
    buildCommand: npm ci && npm run build && npx prisma migrate deploy
    startCommand: npm run start:prod
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
